services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${TT_PORT:-8000}:8000"
    environment:
      - TT_HOST=0.0.0.0
      - TT_PORT=8000
      - TT_DEBUG=${TT_DEBUG:-false}
      - TT_DETECTOR=${TT_DETECTOR:-langdetect}
      - TT_VOICE_EN=${TT_VOICE_EN:-en_US-lessac-medium}
      - TT_VOICE_ES=${TT_VOICE_ES:-es_ES-davefx-medium}
      - TT_CORS_ORIGINS=${TT_CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    volumes:
      # Mount models directory for hot-swapping voice files without rebuild
      - ./backend/models:/app/models:ro
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FE_PORT:-80}:80"
    depends_on:
      - backend
